<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tiger-openapi browser example</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f5f7fb;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: #334155;
      }

      .row {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      input,
      textarea,
      button,
      select {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
      }

      input,
      textarea,
      select {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: #0f172a;
        color: #fff;
        cursor: pointer;
      }

      pre {
        margin-top: 16px;
        padding: 12px;
        background: #0b1020;
        color: #e2e8f0;
        border-radius: 8px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Browser Example</h1>
      <p>Pure HTML + Pure JavaScript demo with multiple modules from <code>tiger-openapi/browser</code>.</p>

      <div class="row">
        <label for="tigerId">TIGER_ID</label>
        <input id="tigerId" placeholder="your tiger id" />
      </div>

      <div class="row">
        <label for="account">ACCOUNT</label>
        <input id="account" placeholder="your account" />
      </div>

      <div class="row">
        <label for="privateKey">PRIVATE_KEY</label>
        <textarea id="privateKey" placeholder="-----BEGIN PRIVATE KEY-----..."></textarea>
      </div>

      <div class="row">
        <label for="action">ACTION</label>
        <select id="action">
          <option value="accountInfo">account.getAccountInfo</option>
          <option value="commonPermission">quote.common.getQuotePermission</option>
          <option value="stockMarketStatus">quote.stock.getMarketStatus</option>
          <option value="optionSymbols">quote.options.getOptionSymbols</option>
          <option value="scanner">quote.scanner.getScanner</option>
          <option value="cryptoSymbols">quote.crypto.getSymbols</option>
          <option value="fundSymbols">quote.funds.getFundSymbols</option>
          <option value="warrantBriefs">quote.warrants.getWarrantBriefs</option>
          <option value="futureExchanges">quote.futures.getFutureExchanges</option>
        </select>
      </div>

      <div class="row">
        <label for="market">MARKET</label>
        <select id="market">
          <option value="US">US</option>
          <option value="HK">HK</option>
        </select>
      </div>

      <div class="row">
        <label for="symbol">SYMBOL</label>
        <input id="symbol" value="29145" />
      </div>

      <button id="runBtn" type="button">Run</button>
      <pre id="output">Click the button to run.</pre>
    </main>

    <script type="importmap">
      {
        "imports": {
          "tiger-openapi/browser": "./node_modules/tiger-openapi/dist/browser.js"
        }
      }
    </script>

    <script type="module">
      import { createTigerClient } from 'tiger-openapi/browser';

      const runBtn = document.getElementById('runBtn');
        const output = document.getElementById('output');
        const actionSelect = document.getElementById('action');

        function setOutput(value) {
          output.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
        }

        runBtn.addEventListener('click', async () => {
          const tigerId = document.getElementById('tigerId').value.trim();
          const account = document.getElementById('account').value.trim();
          const privateKey = document.getElementById('privateKey').value.trim();
          const market = document.getElementById('market').value;
          const symbol = document.getElementById('symbol').value.trim() || '29145';
          const action = actionSelect.value;

        if (!tigerId || !account || !privateKey) {
          setOutput('Please fill TIGER_ID / ACCOUNT / PRIVATE_KEY first.');
          return;
        }

        setOutput('Loading...');

        try {
          const client = createTigerClient({
            tigerId,
            account,
            privateKey,
          });

          let result;
          switch (action) {
            case 'accountInfo':
              result = await client.account.getAccountInfo();
              break;
            case 'commonPermission':
              result = await client.quote.common.getQuotePermission();
              break;
            case 'stockMarketStatus':
              result = await client.quote.stock.getMarketStatus({ market });
              break;
            case 'optionSymbols':
              result = await client.quote.options.getOptionSymbols();
              break;
            case 'scanner':
              result = await client.quote.scanner.getScanner({ market, page: 1, page_size: 10 });
              break;
            case 'cryptoSymbols':
              result = await client.quote.crypto.getSymbols();
              break;
            case 'fundSymbols':
              result = await client.quote.funds.getFundSymbols();
              break;
            case 'warrantBriefs':
              result = await client.quote.warrants.getWarrantBriefs({ symbols: [symbol] });
              break;
            case 'futureExchanges':
              result = await client.quote.futures.getFutureExchanges();
              break;
            default:
              result = { message: `Unknown action: ${action}` };
          }

          setOutput(result);
        } catch (error) {
          setOutput({ message: error instanceof Error ? error.message : String(error) });
        }
      });
    </script>
  </body>
</html>
