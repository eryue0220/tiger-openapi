name: Deploy Playground

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Fix pnpm PATH precedence (action-setup v6 workaround)
        shell: bash
        run: |
          set -euo pipefail
          expected="$(node -p "require('./package.json').packageManager.replace(/^pnpm@/, '')")"
          if [[ -n "${PNPM_HOME:-}" && -x "${PNPM_HOME}/bin/pnpm" ]]; then
            echo "${PNPM_HOME}/bin" >> "$GITHUB_PATH"
            export PATH="${PNPM_HOME}/bin:$PATH"
          fi
          actual="$(pnpm --version)"
          echo "pnpm from: $(command -v pnpm)"
          echo "pnpm version: $actual (expected: $expected)"
          [[ "$actual" == "$expected" ]]

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Playground
        run: pnpm build

      - name: Upload static artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: playground/out

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
