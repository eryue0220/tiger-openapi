name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  should-release:
    name: Detect release changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          if [[ "${{ github.event.head_commit.message }}" == "chore: release packages" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"

          if echo "$changed_files" | grep -Eq '^\.changeset/[^/]+\.md$'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release packages
    needs: should-release
    if: github.repository == 'eryue0220/tiger-openapi' && needs.should-release.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate JSR manifests
        run: pnpm jsr:check

      - name: Build packages
        run: pnpm build

      - name: Create release PR or publish packages
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: release packages'
          title: 'chore: release packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
