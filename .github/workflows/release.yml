name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  should-release:
    name: Detect release changes
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          if [[ "${{ github.event.head_commit.message }}" == "chore: release packages" ]]; then
            echo "mode=publish" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"

          if echo "$changed_files" | grep -Eq '^\.changeset/[^/]+\.md$'; then
            echo "mode=version" >> "$GITHUB_OUTPUT"
          else
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release packages
    needs: should-release
    if: github.repository == 'eryue0220/tiger-openapi' && needs.should-release.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version packages
        if: needs.should-release.outputs.mode == 'version'
        run: pnpm version-packages

      - name: Commit release changes
        if: needs.should-release.outputs.mode == 'version'
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m 'chore: release packages'
          git push origin HEAD:main

      - name: Validate JSR manifests
        if: needs.should-release.outputs.mode == 'publish'
        run: pnpm jsr:check

      - name: Build publishable package and workspace dependencies
        if: needs.should-release.outputs.mode == 'publish'
        run: pnpm turbo run build --filter=tiger-openapi --force

      - name: Publish packages
        if: needs.should-release.outputs.mode == 'publish'
        run: pnpm release
        env:
          NPM_CONFIG_PROVENANCE: true
